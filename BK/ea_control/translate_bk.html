<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Translator | Investor & Gen-Z</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .glow:focus { box-shadow: 0 0 15px rgba(34, 211, 238, 0.3); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full">
        <div class="glass rounded-[2rem] p-8 shadow-2xl relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-cyan-500/10 blur-[50px] rounded-full"></div>

            <div class="mb-8">
                <h1 class="text-2xl font-bold tracking-tight">AI Fast <span class="text-cyan-400 text-sm align-top">FLASH</span></h1>
                <p class="text-slate-500 text-xs font-medium uppercase tracking-[0.2em] mt-1">Investor & Gen-Z Edition</p>
            </div>

            <div class="space-y-2 mb-6">
                <textarea id="inputText" rows="3" placeholder="Input Thai..." 
                    class="w-full bg-transparent border-none text-xl placeholder:text-slate-600 focus:outline-none resize-none transition-all"
                ></textarea>
            </div>

            <div class="flex items-center justify-between border-t border-slate-800 pt-6">
                <button onclick="translateAction()" id="btnTranslate"
                    class="group flex items-center gap-2 bg-white text-slate-950 font-bold py-3 px-6 rounded-2xl hover:bg-cyan-400 transition-all active:scale-95 disabled:opacity-50">
                    <span>TRANSLATE</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                    </svg>
                </button>
                <div id="status" class="text-[10px] text-slate-500 font-mono italic">READY</div>
            </div>

            <div class="mt-10 p-6 rounded-2xl bg-slate-950/50 border border-slate-800 group relative">
                <div id="outputText" class="text-cyan-400 text-lg font-medium leading-relaxed italic">
                    Waiting for input...
                </div>
                <button onclick="copyResult()" class="absolute top-2 right-2 p-2 text-slate-600 hover:text-cyan-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ================= CONFIGURATION =================
        const CONFIG = {
            // ⚠️ ใส่ API Key จาก https://console.groq.com/keys
            API_KEY: "",
            MODEL: "llama-3.3-70b-versatile", // เร็ว + ฟรี +똑똑
            SYSTEM_PROMPT: "You are a translator. Translate Thai to English. Style: Concise, Modern, Investor/Gen-Z slang. No filler. No explanation. Maximum impact. Use investor terms if relevant. Output translation only."
        };
        // =================================================

        async function translateAction() {
            const text = document.getElementById('inputText').value;
            const outputDiv = document.getElementById('outputText');
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('btnTranslate');

            if (!text.trim()) return;

            // UI Loading
            outputDiv.style.opacity = "0.5";
            statusDiv.innerText = "PROCESSING...";
            btn.disabled = true;
            outputDiv.innerText = "Thinking...";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${CONFIG.API_KEY}`
                    },
                    body: JSON.stringify({
                        model: CONFIG.MODEL,
                        messages: [
                            { role: "system", content: CONFIG.SYSTEM_PROMPT },
                            { role: "user", content: text }
                        ],
                        temperature: 0.9,
                        max_tokens: 200
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                const result = data.choices?.[0]?.message?.content;

                if (result) {
                    outputDiv.innerText = result.trim();
                    statusDiv.innerText = "COMPLETED";
                } else {
                    outputDiv.innerText = "Error: ไม่มีผลลัพธ์";
                    statusDiv.innerText = "EMPTY";
                }

            } catch (error) {
                console.error("Full Error:", error);
                outputDiv.innerText = "Error: " + error.message;
                statusDiv.innerText = "FAILED";
            } finally {
                outputDiv.style.opacity = "1";
                btn.disabled = false;
            }
        }

        function copyResult() {
            const text = document.getElementById('outputText').innerText;
            if (!text || text.includes("Thinking") || text.includes("Error") || text.includes("Waiting")) return;
            navigator.clipboard.writeText(text);
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "COPIED!";
            setTimeout(() => statusDiv.innerText = "READY", 2000);
        }

        // Shortcut Enter
        document.getElementById('inputText').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                translateAction();
            }
        });
    </script>
</body>
</html>
